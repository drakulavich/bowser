name: release

on:
  push:
    tags:
      - "v*"
  # Allow manual runs from the Actions UI (handy for re-publishing binaries
  # against an already-pushed tag).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # needed to create the GitHub Release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: bowser-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: bowser-linux-arm64
          # Cross-compile Darwin targets from Linux — avoids queuing on the
          # scarce macos-13 (Intel) runners that Apple is deprecating. Bun's
          # compiler fully supports cross-targeting.
          - os: ubuntu-latest
            target: bun-darwin-arm64
            asset: bowser-macos-arm64
          - os: ubuntu-latest
            target: bun-darwin-x64
            asset: bowser-macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Compile single-file binary
        run: |
          mkdir -p dist
          bun build src/cli.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile dist/${{ matrix.asset }}
      - name: Smoke-test the binary
        # Only run when the compiled target matches the runner — everything
        # else is a cross-compile that can't execute here.
        if: matrix.target == 'bun-linux-x64'
        run: ./dist/${{ matrix.asset }} --help
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List downloaded assets
        run: ls -la dist
      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum bowser-* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Bowser ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/bowser-linux-x64
            dist/bowser-linux-arm64
            dist/bowser-macos-arm64
            dist/bowser-macos-x64
            dist/SHA256SUMS.txt

  npm:
    # Publish to npm as @drakulavich/bowser-cli. Requires NPM_TOKEN secret
    # on the repo (Automation token with "Publish" permission).
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }} # skip prereleases like v0.1.0-rc.1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Verify version matches tag
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VER="${TAG#v}"
          if [ "$PKG" != "$TAG_VER" ]; then
            echo "package.json version ($PKG) does not match tag ($TAG_VER)"
            exit 1
          fi
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
