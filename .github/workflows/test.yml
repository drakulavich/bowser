name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install headless Chromium via Playwright
        run: bunx --bun playwright install --only-shell chromium
      - name: Local e2e
        env:
          # Playwright drops chrome-headless-shell under ~/.cache/ms-playwright
          # which Bun.WebView auto-detects.
          BOWSER_E2E: "1"
        run: bun test tests/e2e.test.ts tests/e2e-todo.test.ts
