name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install headless Chromium
        run: sudo apt-get update && sudo apt-get install -y chromium-headless-shell
      - run: bun install
      - name: Local e2e
        run: BOWSER_E2E=1 bun test tests/e2e.test.ts tests/e2e-todo.test.ts
