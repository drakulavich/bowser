name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install headless Chromium via Playwright
        run: bunx --bun playwright install --only-shell --with-deps chromium
      - name: Resolve Chromium path
        id: chromium
        run: |
          BIN=$(find "$HOME/.cache/ms-playwright" -type f -name chrome-headless-shell | head -n1)
          echo "Found: $BIN"
          test -x "$BIN"
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
      - name: Local e2e
        env:
          BOWSER_E2E: "1"
          BOWSER_CHROMIUM_PATH: ${{ steps.chromium.outputs.path }}
          BOWSER_CHROME_ARGS: "--no-sandbox"
          BOWSER_CHROME_DEBUG: "1"
        run: bun test tests/e2e.test.ts tests/e2e-todo.test.ts
